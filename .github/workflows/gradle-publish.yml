name: Build Mod
on: [push]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.11-bin.zip
          unzip -q gradle-8.11-bin.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.11/bin" >> $GITHUB_PATH
      - name: Build
        run: gradle build
      - uses: actions/upload-artifact@v4
        with:
          name: superpowers-jar
          path: build/libs/*.jar
 
